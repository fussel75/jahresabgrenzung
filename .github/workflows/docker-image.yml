name: Docker-Image bauen & veröffentlichen

# Baut bei jedem Push auf main automatisch ein fertiges Docker-Image und
# legt es in der GitHub Container Registry (ghcr.io) ab. So muss auf dem
# Server NICHTS gebaut werden — es wird nur das fertige Image gezogen.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: An ghcr.io anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Image bauen & pushen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/fussel75/jahresabgrenzung:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
