# ====================================================================
# EINFACHSTER WEG — In Hostinger Docker Manager unter "Compose" ->
# "Manuell erstellen" einfügen (Projektname z.B. "jahresabgrenzung").
# Es wird das fertige Image von GitHub gezogen (nichts wird gebaut).
#
# Hostingers Traefik läuft im HOST-Netzwerk-Modus und findet den Dienst
# automatisch über die Labels — daher KEIN networks-Block nötig.
#
# Vorher 1x in Hostinger "Traefik bereitstellen" geklickt haben.
# NUR EINE ZEILE anpassen:  AUTH_PASSWORD
# ====================================================================

services:
  app:
    image: ghcr.io/fussel75/jahresabgrenzung:latest
    restart: unless-stopped
    environment:
      - APP_DOMAIN=jahresabgrenzung.fristd-bau.com
      - AUTH_USER=fristd-bau-abgrenzung
      - AUTH_PASSWORD=HIER-EIN-STARKES-PASSWORT-EINTRAGEN
      - DATABASE_URL=file:/data/jahresabgrenzung.db
      - PORT=3000
      - NODE_ENV=production
      # --- HAPAK / Synology-NAS (read-only). Passwort auf dem Server setzen. ---
      # HAPAK_NAS_ID darf ID, QuickConnect-URL oder Host sein.
      - HAPAK_NAS_ID=megathron2024
      - HAPAK_NAS_USER=replit-invoice
      - HAPAK_NAS_PASS=HIER-DAS-NAS-PASSWORT
      - HAPAK_BASIS_PFAD=/HapakV22/FB ZuB
    volumes:
      - app_data:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.jahresabgrenzung.rule=Host(`jahresabgrenzung.fristd-bau.com`)
      - traefik.http.routers.jahresabgrenzung.entrypoints=websecure
      - traefik.http.routers.jahresabgrenzung.tls.certresolver=letsencrypt
      - traefik.http.services.jahresabgrenzung.loadbalancer.server.port=3000
      # Auto-Update via Watchtower (aktualisiert NUR diesen Container):
      - com.centurylinklabs.watchtower.enable=true

volumes:
  app_data:
