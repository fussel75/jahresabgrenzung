# Produktions-Setup für Hostinger Docker Manager mit Traefik.
#
# Voraussetzung: In Hostinger einmal "Traefik bereitstellen" geklickt.
# Hostingers Traefik läuft im HOST-Netzwerk-Modus und erkennt Dienste
# automatisch über die Labels (Docker-Provider) — daher KEIN eigener
# networks-Block und KEINE veröffentlichten Ports nötig.
#
# Werte kommen aus der .env (siehe .env.production.example):
#   APP_DOMAIN, AUTH_USER, AUTH_PASSWORD

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # SQLite-Datei im persistenten Volume (absoluter Pfad = eindeutig).
      - DATABASE_URL=file:/data/jahresabgrenzung.db
      - PORT=3000
      - NODE_ENV=production
    volumes:
      - app_data:/data
    labels:
      - traefik.enable=true
      # Domain steht in der .env:
      - traefik.http.routers.jahresabgrenzung.rule=Host(`${APP_DOMAIN}`)
      - traefik.http.routers.jahresabgrenzung.entrypoints=websecure
      - traefik.http.routers.jahresabgrenzung.tls.certresolver=letsencrypt
      # Interner Port der App (Traefik leitet 443 -> 3000):
      - traefik.http.services.jahresabgrenzung.loadbalancer.server.port=3000

volumes:
  app_data: # SQLite-Datenbank (Backup: siehe DEPLOY.md)
